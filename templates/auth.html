{% extends "base.html" %}

{% block title %}Authentication | CredScore{% endblock %}

{% block content %}
<div class="auth-container reveal">
    <div class="glass-card" style="padding: 0; overflow: hidden;">
        <div class="auth-tabs">
            <div id="loginTab" class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div id="signupTab" class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div class="auth-form">
            <form id="loginForm" method="POST" action="{{ url_for('auth') }}">
                <input type="hidden" name="action" value="login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary full-width mt-1">Welcome Back</button>
            </form>

            <form id="signupForm" style="display: none;" method="POST" action="{{ url_for('auth') }}">
                <input type="hidden" name="action" value="signup">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="name@college.edu" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label>I am a...</label>
                    <select name="role" id="roleSelect" class="form-control" required onchange="toggleCollege()">
                        <option value="Student">Student</option>
                        <option value="Business">Business</option>
                        <option value="Recruiter">Recruiter</option>
                    </select>
                </div>
                <div class="form-group" id="collegeGroup">
                    <label>College Name</label>
                    <input type="text" name="college" class="form-control" placeholder="e.g. SRM Institute">
                </div>
                <button type="submit" class="btn btn-primary full-width mt-1">Create Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(tab) {
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        
        if (tab === 'login') {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
        } else {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
        }
    }

    function toggleCollege() {
        const role = document.getElementById('roleSelect').value;
        const collegeGroup = document.getElementById('collegeGroup');
        const collegeInput = collegeGroup.querySelector('input');
        
        if (role === 'Student') {
            collegeGroup.style.display = 'block';
            collegeInput.required = true;
        } else {
            collegeGroup.style.display = 'none';
            collegeInput.required = false;
        }
    }
</script>
{% endblock %}
