{% extends "base.html" %}

{% block title %}Contact Us | CredScore{% endblock %}

{% block head %}
<style>
    .page-header {
        padding: 10rem 0 4rem;
        text-align: center;
    }
    .contact-form-container {
        max-width: 600px;
        margin: 0 auto 6rem;
    }
</style>
{% endblock %}

{% block content %}
<header class="page-header reveal">
    <h1>Contact Us.</h1>
    <p style="color: var(--muted);">Have questions? We'd love to hear from you.</p>
</header>
<section class="contact-form-container reveal">
    <div class="glass-card">
        <form onsubmit="event.preventDefault(); showToast('Message sent! We will get back to you soon.'); this.reset();">
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea class="form-control" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
    </div>
</section>
{% endblock %}
